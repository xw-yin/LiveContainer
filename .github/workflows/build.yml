name: Xcode - Build

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs: 
      release__nightly:
        description: Create a nightly release
        type: boolean
        required: false

jobs:
  build:
    name: Build using xcodebuild command
    runs-on: macos-26
    env:
      scheme: LiveContainer
      archive_path: archive
    outputs:
      scheme: ${{ steps.scheme.outputs.scheme }}
      archive_path: ${{ env.archive_path }}
      artifact: ${{ env.scheme }}.ipa
      artifact2: ${{ env.scheme }}+SideStore.ipa
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set Scheme
        id: scheme
        run: |
          if [ $scheme = default ]
          then
            scheme_list=$(xcodebuild -list -json | tr -d "\n")
            scheme=$(echo $scheme_list | ruby -e "require 'json'; puts JSON.parse(STDIN.gets)['project']['targets'][0]")
            echo Using default scheme: $scheme
          else
            echo Using configured scheme: $scheme
          fi
          echo "scheme=$scheme" >> $GITHUB_OUTPUT
      - name: Set filetype_parameter
        id: filetype_parameter
        run: |
          filetype_parameter=`ls -A | grep -i \\.xcworkspace\$ && echo workspace || echo project`
          echo "filetype_parameter=$filetype_parameter" >> $GITHUB_OUTPUT
      - name: Set file_to_build
        id: file_to_build
        run: |
          file_to_build=`ls -A | grep -i \\.xcworkspace\$ || ls -A | grep -i \\.xcodeproj\$`
          file_to_build=`echo $file_to_build | awk '{$1=$1;print}'`
          echo "file_to_build=$file_to_build" >> $GITHUB_OUTPUT
      - name: Archive
        env:
          scheme: ${{ steps.scheme.outputs.scheme }}
          filetype_parameter: ${{ steps.filetype_parameter.outputs.filetype_parameter }}
          file_to_build: ${{ steps.file_to_build.outputs.file_to_build }}
        run: xcodebuild archive -archivePath "$archive_path" -scheme "$scheme" -"$filetype_parameter" "$file_to_build" -sdk iphoneos -arch arm64 -configuration Release | xcpretty && exit ${PIPESTATUS[0]}
      - name: Build Patched SideStore
        run: |
          brew install ldid xcbeautify || true
          git clone --depth 1 --branch LiveContainerSupport --recurse-submodules --shallow-submodules https://github.com/xw-yin/SideStore.git SideStoreBuild
          git -C SideStoreBuild apply "$GITHUB_WORKSPACE/.github/sidelc/sidestore-source-detail-navigation.patch"
          git -C SideStoreBuild apply "$GITHUB_WORKSPACE/.github/sidelc/sidestore-nonblocking-startup.patch"
          git -C SideStoreBuild apply --index --recount "$GITHUB_WORKSPACE/.github/sidelc/sidestore-language-selection.patch"
          git -C SideStoreBuild submodule update --init --recursive --depth 1
          python3 "$GITHUB_WORKSPACE/.github/sidelc/patch_package.py"
          test "$(git -C SideStoreBuild/Dependencies/AltSign rev-parse HEAD)" = "16af0d75bf8c8495b0b34e36c5051a9977e0ea28"
          test "$(git -C SideStoreBuild/Dependencies/minimuxer rev-parse HEAD)" = "f00298393ba0cbb0f66cacde421daad78f6a15f6"
          test -z "$(find SideStoreBuild -name '*.rej' -o -name '*.orig')"
          grep -Fq 'SideStoreApp.framework' SideStoreBuild/AltStore/AppDelegate.swift
          grep -Fq 'AppleLanguages' SideStoreBuild/AltStore/Settings/SettingsViewController.swift
          grep -Fq 'let cacheKey = "\(globallyUniqueID)-\(layoutWidth)"' SideStoreBuild/AltStore/News/NewsViewController.swift
          grep -Fq 'viewWillTransition(to size:' SideStoreBuild/AltStore/News/NewsViewController.swift
          grep -Fq 'contentInsetAdjustmentBehavior = .never' SideStoreBuild/AltStore/News/NewsViewController.swift
          grep -Fq 'layout.sectionInsetReference = .fromContentInset' SideStoreBuild/AltStore/News/NewsViewController.swift
          grep -Fq 'collectionView.bounds.width - (maxHorizontalSafeArea * 2) - 32' SideStoreBuild/AltStore/News/NewsViewController.swift
          grep -Fq 'UIEdgeInsets(top: 30, left: horizontalInset, bottom: 13, right: horizontalInset)' SideStoreBuild/AltStore/News/NewsViewController.swift
          grep -Fq 'collectionView.bounds.width - safeAreaWidth - 32' 'SideStoreBuild/AltStore/My Apps/MyAppsViewController.swift'
          grep -Fq 'layout.sectionInsetReference = .fromSafeArea' 'SideStoreBuild/AltStore/My Apps/MyAppsViewController.swift'
          grep -Fq 'section.contentInsets' SideStoreBuild/AltStore/Sources/SourcesViewController.swift
          grep -Fq 'contentInsetsReference = .safeArea' SideStoreBuild/AltStore/Sources/SourcesViewController.swift
          grep -Fq 'viewWillTransition(to size:' SideStoreBuild/AltStore/Sources/SourcesViewController.swift
          grep -Fq 'setCollectionViewLayout(self.makeLayout(), animated: false)' SideStoreBuild/AltStore/Sources/SourcesViewController.swift
          grep -Fq 'cell.contentView.preservesSuperviewLayoutMargins = false' SideStoreBuild/AltStore/Sources/SourcesViewController.swift
          grep -Fq 'layoutSection.contentInsets' SideStoreBuild/AltStore/Sources/AddSourceViewController.swift
          grep -Fq 'autoresizingMask key="autoresizingMask" widthSizable="YES" flexibleMaxY="YES"' SideStoreBuild/AltStore/Settings/Settings.storyboard
          grep -Fq 'self.insetView.leadingAnchor.constraint(equalTo: self.safeAreaLayoutGuide.leadingAnchor, constant: 16)' SideStoreBuild/AltStore/Settings/InsetGroupTableViewCell.swift
          grep -Fq 'left: self.safeAreaInsets.left + 30' SideStoreBuild/AltStore/Settings/InsetGroupTableViewCell.swift
          grep -Fq 'left: self.safeAreaInsets.left + 30' SideStoreBuild/AltStore/Settings/SettingsHeaderFooterView.swift
          grep -Fq 'Enable AppExtns Customization' SideStoreBuild/AltStore/zh-Hans.lproj/Localizable.strings
          grep -Fq '后台刷新' SideStoreBuild/AltStore/zh-Hans.lproj/Settings.strings
          make -C SideStoreBuild build fakesign ipa
          unzip -l SideStoreBuild/SideStore.ipa > /tmp/SideStore.ipa.contents
          grep -Fq 'zh-Hans.lproj/Settings.strings' /tmp/SideStore.ipa.contents
          cp SideStoreBuild/SideStore.ipa "$GITHUB_WORKSPACE/SideStore.patched.ipa"
      - name: Create IPA
        env:
          SIDESTORE_IPA_PATH: ${{ github.workspace }}/SideStore.patched.ipa
        run: |
          sh .github/build_github.sh

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.scheme }}.ipa
          path: ${{ env.scheme }}.ipa
          retention-days: 1
      
      - name: Upload LiveContainer+SideStore
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.scheme }}+SideStore.ipa
          path: ${{ env.scheme }}+SideStore.ipa
          retention-days: 1

  release__nightly:
    name: Nightly Release
    permissions:
      contents: write
    if: inputs.release__nightly || github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    needs: [build]
    concurrency:
      group: release__nightly
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Download a Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.artifact }}
      - name: Download a Build Artifact2
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.artifact2 }}
      - name: Get Commit Info
        id: commit_info
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          echo "COMMIT_SHA=$COMMIT_SHA" >> $GITHUB_ENV
          echo "COMMIT_MSG=$COMMIT_MSG" >> $GITHUB_ENV
      - name: Update AltStore source
        id: update_source
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NIGHTLY_LINK: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}
          commit_sha: ${{ env.COMMIT_SHA }}
          commit_msg: ${{ env.COMMIT_MSG }}
        run: |
          python .github/update_json.py
      - name: Nightly Release
        uses: andelf/nightly-release@5834076edc55cc05975561c9722043f072ac5c26
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with: 
          body: |
            **Commit:** [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            **Message:** ${{ github.event.head_commit.message }}
            
            This is a nightly release [created automatically with GitHub Actions workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}).
          files: |
            ${{ needs.build.outputs.artifact }}
            ${{ needs.build.outputs.artifact2 }}
            .github/apps_nightly.json
      - name: Update apps.json in Release 1.0
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "1.0"
          files: |
            .github/apps_ss_lc.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
